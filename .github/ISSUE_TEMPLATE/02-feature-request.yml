name: Feature request
description: Propose a product, UX, parser, provider, or developer-experience improvement.
title: "[feature] "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Strong feature requests start with the problem, not just the implementation idea.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: I can inspect single calls, but I cannot quickly compare repeated failures across one session.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      placeholder: Add a compact error-focused filter in the TUI that jumps between failed calls.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      placeholder: I currently export JSONL and grep through it, but that breaks the live debugging loop.
  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Proxy behavior
        - Parsing
        - Streaming support
        - Pricing and cost estimates
        - Terminal UI
        - Export and redaction
        - Documentation
        - New provider support
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include screenshots, rough examples, or linked issues if they help.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I checked for existing feature requests first.
          required: true
        - label: This request describes a real workflow or pain point.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
