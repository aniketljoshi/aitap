    <rect x="1072" y="536" width="378" height="86" rx="16" fill="#0B1826" stroke="#183246"/>
    <text x="1096" y="568" fill="#8AB4FF" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">request</text>
    <text x="1096" y="598" fill="#DDE7F2" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">user: Summarize latest PR changes.</text>

    <rect x="1072" y="646" width="184" height="8" rx="4" fill="url(#lineA)"/>
    <rect x="1272" y="646" width="112" height="8" rx="4" fill="url(#lineB)"/>
    <rect x="1400" y="646" width="50" height="8" rx="4" fill="#28435A"/>
