  <text x="347" y="578" fill="#E8F4FF" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">anthropic</text>
  <text x="565" y="578" fill="#E8F4FF" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">google</text>
  <text x="153" y="642" fill="#E8F4FF" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">openrouter</text>
  <text x="379" y="642" fill="#E8F4FF" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">ollama</text>

  <text x="120" y="732" fill="#61E5A7" font-size="22" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">$ aitap --port 9119 --filter openai</text>
  <text x="120" y="776" fill="#D9E6F2" font-size="24" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace">No certs. No dashboard. No mystery.</text>

